version: 2.1

jobs:
  build:
    docker:
      - image: cimg/base:stable

    steps:
      - setup_remote_docker
      - run:
          name: Run Docker image with NET_ADMIN
          command: |
            docker pull marosoo9/aug
            docker run --rm --cap-add=NET_ADMIN --device=/dev/net/tun marosoo9/aug
